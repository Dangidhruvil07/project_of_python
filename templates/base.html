<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HexaMobiles</title>

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="icon"
            href="{{ url_for('static', filename='images/favicon.png') }}"
        />
        <!-- Your CSS -->
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
    </head>
    <script>
        setTimeout(() => {
            let alerts = document.querySelectorAll(".flash-alert");

            alerts.forEach((alert) => {
                alert.style.display = "none";
            });
        }, 3000);
    </script>
    <body>
        <!-- ══════════════════════════════
         NAVBAR
    ══════════════════════════════ -->
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <!-- LOGO -->
                <a class="navbar-brand" href="/products">
                    <span class="hex">Hexa</span
                    ><span class="mob">Mobiles</span>
                </a>

                <!-- MOBILE TOGGLE -->
                <button
                    class="navbar-toggler border-0"
                    data-bs-toggle="collapse"
                    data-bs-target="#nav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- CENTER MENU -->
                <div
                    class="collapse navbar-collapse justify-content-center"
                    id="nav"
                >
                    <ul class="navbar-nav gap-1">
                        <li class="nav-item">
                            <a class="nav-link" href="/products"
                                >All Products</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/category/phone"
                                >Phones</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/category/laptop"
                                >Laptops</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/category/audio">Audio</a>
                        </li>
                    </ul>
                </div>

                <!-- RIGHT SIDE -->
                <div class="d-flex align-items-center gap-3">
                    <!-- Cart -->
                    <a href="/cart" class="cart-link">🛒</a>

                    <!-- My Orders -->
                    {% if session.user %}
                    <a
                        href="/myorders"
                        class="nav-link fw-semibold d-none d-lg-block"
                        style="color: var(--muted); font-size: 14px"
                    >
                        📦 Orders
                    </a>
                    {% endif %}

                    <!-- User + Logout -->
                    {% if session.user %}
                    <div class="user-chip d-none d-lg-flex">
                        <span class="dot"></span>
                        {{ session.user }}
                    </div>
                    <a href="/logout" class="btn-logout">Logout</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <!-- ══════════════════════════════
         PAGE CONTENT
    ══════════════════════════════ -->
        <div class="container">
            <div style="height: 8px"></div>
            {% block content %} {% endblock %}
        </div>

        <div class="page-bottom-pad"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
        <!-- LOGIN MODAL -->

        <div class="modal fade" id="loginModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Login to Continue</h5>

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>

                    <div class="modal-body">
                        <form method="POST" action="/login">
                            <div class="mb-3">
                                <label>Email</label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required
                                />
                            </div>

                            <div class="mb-3">
                                <label>Password</label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required
                                />
                            </div>

                            <button type="submit" class="btn btn-dark w-100">
                                Login
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>

            {% endfor %}

        </div>

    {% endif %}
{% endwith %} -->
</html>
